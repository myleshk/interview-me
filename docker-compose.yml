# docker-compose.yml — Local development stack
# Run from project root: docker compose up -d

services:
  # ── API Backend ────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    depends_on:
      qdrant:
        condition: service_started
      embedding:
        condition: service_started
    volumes:
      - ../data:/app/data:ro  # mount identity.json + static/cv.pdf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Embedding Service ──────────────────────────────────
  embedding:
    build:
      context: ./embedding
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      EMBEDDING_MODEL_NAME: BAAI/bge-small-en-v1.5
    volumes:
      - embedding_cache:/app/model_cache

  # ── Qdrant Vector Store ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  qdrant_storage:
  embedding_cache:
